<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whatimado | AI Business Generator</title>
    <style>
        /* Minimalist & Vintage-Inspired Global Styles */
        body {
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: max-width 0.3s ease;
        }

        /* Expand the layout bounds when showing the horizontal scroll results track */
        .container.canvas-mode {
            max-width: 100%;
            padding: 40px 0;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 8px 0;
        }

        .subtitle {
            font-size: 13px;
            color: #666666;
            margin: 0;
        }

        /* Input Form Screen Styles */
        .input-screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #ffffff;
            font-size: 15px;
            color: #111111;
            resize: none;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            border-color: #111111;
        }

        button.submit-btn {
            width: 100%;
            padding: 16px;
            background-color: #111111;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button.submit-btn:hover {
            background-color: #333333;
        }

        /* Loading State */
        .loading {
            display: none;
            font-size: 14px;
            color: #666666;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 20px;
        }

        /* Dynamic Node Tree Layout (The Circles) */
        .node-screen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: #888888;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 8px;
            outline: none;
            padding: 0;
        }

        .back-btn:hover {
            color: #111111;
        }

        .instruction-text {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #b5b5b5;
            text-transform: uppercase;
            margin: 0 0 40px 0;
        }

        /* HORIZONTAL SCROLL TIMELINE PIPELINE CANVAS */
        .node-track-viewport {
            width: 100vw;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            padding: 40px 0 60px 0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .node-tree-horizontal {
            position: relative;
            display: flex;
            align-items: center;
            gap: 32px;
            padding: 0 40px;
            margin: 0 auto; /* Keeps track centered if items don't overflow viewport width */
        }

        /* Central connecting baseline horizontal wire spine */
        .connecting-line-horizontal {
            position: absolute;
            left: 80px;
            right: 80px;
            top: 50%;
            height: 1.5px;
            background-color: #e5e5e5;
            transform: translateY(-50%);
            z-index: 1;
        }

        .node-column-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        /* Staggered alternating height configurations */
        .node-column-wrap.stagger-up {
            transform: translateY(-24px);
        }

        .node-column-wrap.stagger-down {
            transform: translateY(24px);
        }

        /* Round Node Button Styles */
        .circle-node {
            width: 165px;
            height: 165px;
            border-radius: 50%;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            padding: 20px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .circle-node:hover {
            transform: scale(1.03);
            border-color: #111111;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        .node-icon {
            font-size: 14px;
            color: #111111;
            margin-bottom: 8px;
        }

        .node-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            color: #111111;
            margin: 0 0 4px 0;
            max-width: 125px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .node-subtitle {
            font-size: 11px;
            font-weight: 400;
            color: #888888;
            letter-spacing: 0.02em;
        }

        /* More Options Node Style */
        .more-node {
            width: 135px;
            height: 135px;
            border-style: dashed;
            background: transparent;
            box-shadow: none;
        }

        .more-node:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <header id="app-header">
            <h1>whatimado</h1>
            <p class="subtitle">Discover custom side hustles built around you.</p>
        </header>

        <div id="input-screen" class="input-screen">
            <textarea id="prompt-input" placeholder="Tell me what you're good at, your interests, or what resources you have..."></textarea>
            <button class="submit-btn" onclick="generateIdeas()">Generate Ideas</button>
        </div>

        <div id="loading-indicator" class="loading">Analyzing paths...</div>

        <div id="node-screen" class="node-screen">
            <button class="back-btn" onclick="showInputScreen()">← Back to prompt</button>
            <p class="instruction-text">Scroll sideways to explore idea options</p>
            
            <div class="node-track-viewport">
                <div class="node-tree-horizontal" id="node-tree-container">
                    <div class="connecting-line-horizontal"></div>
                    </div>
            </div>
        </div>
    </div>

    <script>
        // Adjust elements for visibility switching
        const mainContainer = document.getElementById('main-container');
        const inputScreen = document.getElementById('input-screen');
        const nodeScreen = document.getElementById('node-screen');
        const loadingIndicator = document.getElementById('loading-indicator');
        const nodeTreeContainer = document.getElementById('node-tree-container');
        const promptInput = document.getElementById('prompt-input');

        function showInputScreen() {
            mainContainer.classList.remove('canvas-mode');
            nodeScreen.style.display = 'none';
            inputScreen.style.display = 'flex';
        }

        async function generateIdeas() {
            const prompt = promptInput.value.trim();
            if (!prompt) return alert('Please tell the system a bit about yourself first.');

            // Clear previous generation records cleanly, safeguarding the connector wire element
            const elementsToRemove = nodeTreeContainer.querySelectorAll('.node-column-wrap');
            elementsToRemove.forEach(el => el.remove());

            inputScreen.style.display = 'none';
            loadingIndicator.style.display = 'block';

            try {
                // Call the secure Vercel edge endpoint format structure
                const response = await fetch('/api/claude', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-3-5-sonnet-20241022',
                        max_tokens: 1000,
                        messages: [{ 
                            role: 'user', 
                            content: `Analyze the user's background and suggest 3 high-potential side-hustle business ideas. You must respond ONLY with a raw valid JSON array containing exactly three objects. Do not include markdown code block formatting (like \`\`\`json). Each object must have a "title" and a "type" property. Example structure: [{"title": "Dog Walker", "type": "Local Service"}, {"title": "E-commerce Curator", "type": "Digital Store"}]. User info: ${prompt}` 
                        }]
                    })
                });

                if (!response.ok) throw new Error('API server encountered an error connection handshake.');
                
                const rawData = await response.json();
                
                // Extract Claude's response text content cleanly
                const textOutput = rawData.content[0].text.trim();
                const cleanJsonText = textOutput.replace(/```json|```/g, '').trim();
                const ideas = JSON.parse(cleanJsonText);

                // Expand viewport boundaries and render horizontal tree track
                mainContainer.add('canvas-mode');
                renderHorizontalNodeTree(ideas);

                loadingIndicator.style.display = 'none';
                nodeScreen.style.display = 'flex';

            } catch (error) {
                console.error(error);
                alert('Something went wrong. Mind trying that prompt again?');
                loadingIndicator.style.display = 'none';
                showInputScreen();
            }
        }

        function renderHorizontalNodeTree(ideas) {
            ideas.forEach((idea, index) => {
                const columnWrap = document.createElement('div');
                // Alternates height layout alignment vectors cleanly down the line timeline path track
                const stagger = index % 2 === 0 ? 'stagger-up' : 'stagger-down';
                columnWrap.className = `node-column-wrap ${stagger}`;

                columnWrap.innerHTML = `
                    <button class="circle-node" onclick="alert('Exploring: ${idea.title.replace(/'/g, "\\'")}')">
                        <span class="node-icon">✦</span>
                        <h3 class="node-title">${idea.title}</h3>
                        <span class="node-subtitle">${idea.type || 'Side Hustle'}</span>
                    </button>
                `;
                nodeTreeContainer.appendChild(columnWrap);
            });

            // Append the final static "+ More" bubble structural node down at the end of track length
            const moreColumn = document.createElement('div');
            moreColumn.className = 'node-column-wrap';
            moreColumn.innerHTML = `
                <button class="circle-node more-node" onclick="alert('More options coming soon!')">
                    <span class="node-icon">+</span>
                    <h3 class="node-title">More</h3>
                    <span class="node-subtitle">ideas</span>
                </button>
            `;
            nodeTreeContainer.appendChild(moreColumn);
        }
    </script>
</body>
</html>
